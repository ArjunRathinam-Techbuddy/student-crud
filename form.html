{% extends "base.html" %}
{% block title %}{{ action }} Student{% endblock %}
{% block content %}
<div class="card">
    <h2 style="margin-bottom: 20px;">{{ action }} Student</h2>
    <form method="post">
        <div class="field">
            <label>Roll Number</label>
            <input type="text" name="roll_number" value="{{ student.roll_number if student else '' }}" required>
        </div>
        <div class="field">
            <label>Full Name</label>
            <input type="text" name="name" value="{{ student.name if student else '' }}" required>
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" name="email" value="{{ student.email if student else '' }}" required>
        </div>
        <div class="field">
            <label>Department</label>
            <input type="text" name="department" value="{{ student.department if student else '' }}" required>
        </div>
        <div class="field">
            <label>Year</label>
            <select name="year" required>
                {% for y in [1,2,3,4] %}
                <option value="{{ y }}" {% if student and student.year == y %}selected{% endif %}>Year {{ y }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-actions">
            <button class="btn-primary" type="submit">{{ action }} Student</button>
            <a class="btn-secondary" href="{{ url_for('index') }}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
